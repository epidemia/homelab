services:
  readeck:
    container_name: readeck
    image: codeberg.org/readeck/readeck:${READECK_VERSION}
    environment:
      - READECK_DATABASE_SOURCE=sqlite3:/readeck/data/db.sqlite3
      - READECK_LOG_LEVEL=info
      - READECK_LOG_FORMAT=text
    volumes:
      - /srv/docker/readeck:/readeck
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.25
    healthcheck:
      test: ["CMD", "/bin/readeck", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.readeck.rule=Host(`readeck.${BASE_URL}`)"
      - "traefik.http.routers.readeck.entrypoints=websecure"
      - "traefik.http.routers.readeck.tls=true"
      - "traefik.http.routers.readeck.tls.certresolver=letsencrypt"
      - "traefik.http.services.readeck.loadbalancer.server.port=8000"
      - "traefik.docker.network=homelab"

networks:
  homelab:
    external: true
